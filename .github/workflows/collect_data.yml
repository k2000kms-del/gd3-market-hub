name: Market Data Auto Collector

on:
  push:
    branches: [ main ]
  schedule:
    # Run every 30 minutes during Korean market hours (09:00~15:30 KST = 00:00~06:30 UTC) on weekdays (Mon-Fri)
    - cron: '0,30 0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch:

jobs:
  collect-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collector
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
        run: python data_collector.py

      - name: Run specific stocks check
        run: python check_specific_stocks.py > output_sectors.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output_sectors.txt
          git commit -m "chore: update output_sectors.txt [skip ci]" || exit 0
          git push origin main

      - name: Summarize execution
        if: always()
        run: echo "Collection completed at $(date +'%Y-%m-%d %H:%M:%S KST')"